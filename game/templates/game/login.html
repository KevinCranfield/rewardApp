{% extends "game/base.html" %}
{% load static %}

{% block title %}Login — Reward Game{% endblock %}

{% block content %}

<div class="auth-wrapper">

    <div class="auth-card">

        <img src="{% static 'game/images/logo.png' %}" class="auth-logo" width="70" height="70" alt="Reward Game">

        <h2>Welcome Back</h2>
        <p class="auth-sub">Login to your family dashboard</p>

        {% if error %}
            <div class="auth-error" role="alert">{{ error }}</div>
        {% endif %}

        <form method="post" novalidate>
            {% csrf_token %}

            <label class="auth-label" for="id_username">Username</label>
            <input
                type="text"
                id="id_username"
                name="username"
                placeholder="Your username"
                autocomplete="username"
                required
            >

            <label class="auth-label" for="id_password">Password</label>
            <div class="password-wrap">
                <input
                    type="password"
                    id="id_password"
                    name="password"
                    placeholder="Your password"
                    autocomplete="current-password"
                    required
                >
                <button type="button" class="show-pw-btn" onclick="togglePassword('id_password', this)" aria-label="Show password">👁</button>
            </div>

            <a href="/forgot-password/" class="forgot-link">Forgot password?</a>

            <button type="submit">Login</button>
        </form>

        <div class="auth-footer">
            <span>New here?</span>
            <a href="/signup/">Create account</a>
        </div>

    </div>

</div>

<script>
function togglePassword(inputId, btn) {
    const input = document.getElementById(inputId);
    if (!input) return;
    const isHidden = input.type === 'password';
    input.type = isHidden ? 'text' : 'password';
    btn.textContent = isHidden ? '🙈' : '👁';
}
</script>

{% endblock %}
