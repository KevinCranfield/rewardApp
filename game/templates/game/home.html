{% extends "game/base.html" %}
{% load static %}

{% block content %}

<div class="container home-screen">

    <!-- LOGO (smaller, cleaner) -->
    <img 
        src="{% static 'game/images/logo.png' %}" 
        class="home-logo"
        alt="Reward Game"
    >

    <!-- WELCOME -->
    <div class="welcome">
        <h2>👋 Welcome back {{ request.user.username }}</h2>
    </div>

    <!-- GAME LIST -->
    <div class="game-list">

        {% for child in children %}
        <a href="/child/{{ child.id }}/" class="game-card">

            <div class="game-card-header">
                <div class="color-dot" style="background: {{ child.colour }}"></div>
                <h3>{{ child.name }}'s Game</h3>
            </div>

            <div class="game-card-body">
                <span>Continue playing</span>
                <button class="continue-btn">Play</button>
            </div>

        </a>
        {% endfor %}

    </div>

    <!-- QUICK ACTION -->
    <div class="quick-actions">
        <a href="/dashboard/" class="action-btn">⚙️ Dashboard</a>
    </div>

</div>

{% endblock %}
