<!-- =========================
     GAME BOARD (PREMIUM)
========================= -->
<div class="game-card">

    <div class="game-header">
        <h2>🎮 Family Game Board</h2>

        <div class="game-actions">
            <button onclick="toggleAddChild()">+ Add Child</button>
            <button onclick="togglePinSection()">🔐 PIN</button>
            <button id="resetBoardBtn" class="danger">Reset</button>
        </div>
    </div>

    <div class="game-board">

        <div class="board-wrapper">

            <div class="board">

                <svg class="board-overlay"></svg>

                {% for row in squares %}
                    {% for num in row %}
                        <div class="square" data-square="{{ num }}" data-pos="{{ num }}">

                            <span class="square-number">{{ num }}</span>

                            <div class="token-container">
                                {% for child in children %}
                                    {% if child.position == num %}
                                        <div 
                                            class="token"
                                            id="token-{{ child.id }}"
                                            style="background: {{ child.colour }}"
                                        >
                                            {{ child.name|slice:":1" }}
                                        </div>
                                    {% endif %}
                                {% endfor %}
                            </div>

                        </div>
                    {% endfor %}
                {% endfor %}

            </div>

        </div>

    </div>

</div>
