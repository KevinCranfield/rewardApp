{% extends "game/base.html" %}
{% load static %}

{% block title %}Password Reset Complete — Reward Game{% endblock %}

{% block content %}

<div class="auth-wrapper">
    <div class="auth-card">

        <img src="{% static 'game/images/logo.png' %}" class="auth-logo" width="70" height="70" alt="Reward Game">

        <h2>🎉 Password Updated!</h2>
        <p class="auth-sub">Your password has been set. You can now log in with your new password.</p>

        <a href="/login/" class="cta-btn" style="margin-top: 8px;">Go to Login</a>

    </div>
</div>

{% endblock %}
